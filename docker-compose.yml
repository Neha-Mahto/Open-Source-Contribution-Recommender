version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: osir_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: osir_user
      POSTGRES_PASSWORD: osir_pass
      POSTGRES_DB: osir_db
    ports:
      - "5432:5432"
    volumes:
      - osir_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U osir_user -d osir_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: osir_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  osir_postgres_data:
